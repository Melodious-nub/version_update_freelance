<div class="header-wrapper mt-2">
  <div class="row">
    <div class="col-6">
      <div class="filters">
        <search-filter (inputChange)="onInput($event)"
          [placeholder]="'Search by business name or code'"></search-filter>
      </div>
    </div>
    <div class="col-6 d-flex justify-content-end align-items-center">
      <dadyin-button [theme]="'primary'" label="Bulk add" (clicked)="onBulkAdd()"></dadyin-button>
      <dadyin-button [theme]="'default'" label="Invite business" (clicked)="onInviteBusiness()"></dadyin-button>
      <dadyin-button class="mr-2" [theme]="'default'" label="Add new business"
        (clicked)="onAddNewBusiness()"></dadyin-button>
    </div>
  </div>
</div>
<div class="content-wrapper mt-2">
  <data-table [data]="allBusinessList" [headers]="headers" [pageConfig]="pageConfig" (editData)="viewRecord($event)"
    (sortChange)="sort($event)" [actions]="tableActions" (pageChange)="pageChange($event)"
    (actionClick)="onActionClick($event)" (rowChange)="onRowChange($event)"></data-table>
</div>
