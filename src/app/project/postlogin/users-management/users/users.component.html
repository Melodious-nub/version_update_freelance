<div class="app-container">
  <mat-tab-group class="mat-steps" [(selectedIndex)]="currentStepIndex" (selectedTabChange)="onTabChange($event)">
    @for (link of tabs; track link) {
      <mat-tab>
        <ng-template mat-tab-label>
          <span [matBadge]="link.badge" [matBadgeHidden]="link.badge === 0" [matBadgeOverlap]="false">{{
          link.title }}</span>
        </ng-template>
        <ng-template matTabContent>
          @if (link.index == 0) {
            <app-all-business-list></app-all-business-list>
          }
          @if (link.index == 1) {
            <app-active-business-list></app-active-business-list>
          }
          @if (link.index == 2) {
            <app-inactive-business-list></app-inactive-business-list>
          }
        </ng-template>
      </mat-tab>
    }
  </mat-tab-group>
</div>
