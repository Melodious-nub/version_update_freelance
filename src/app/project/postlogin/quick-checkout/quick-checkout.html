<section class="app-container  ">
  <mat-tab-group
    class="mat-steps"
    [selectedIndex]="currentMainIndex"
    (selectedIndexChange)="changeMainTab($event)"
    >
    @for (link of mainTab; track link) {
      <mat-tab>
        <ng-template mat-tab-label>
          <span
            [matBadge]="link.badge"
            [matBadgeHidden]="link.badge === 0"
            [matBadgeOverlap]="false"
            >{{link.title}}</span
            >
          </ng-template>
          <ng-template matTabContent>
            @if (currentMainIndex == 0) {
              <ng-container>
                <div class="mt-2">
                  <div class="header-wrapper">
                    <div class="row mx-auto">
                      <div class="col-6 p-0">
                        <!-- <div class="filters"> -->
                        <search-filter
                          (inputChange)="onInput($event)"
                          [placeholder]="'Search Based On The Order Number'"
                        ></search-filter>
                      <!-- </div> -->
                    </div>
                    <div
                      class="col-6 p-0 d-flex justify-content-end align-items-center align-items-center"
                      >
                      <div class="action-btns">
                        <dadyin-button
                          [theme]="'primary'"
                          label="Quick Checkout"
                          (clicked)="navigateToOrder()"
                          >
                        </dadyin-button>
                      </div>
                    </div>
                  </div>
                </div>
                <div cdkDrag class="uom-config-section">
                  <button
                    (click)="uomSetting=!uomSetting"
                    class="btn bg-primary-light title-text"
                    >
                    UOM Setting
                  </button>
                  @if (uomSetting) {
                    <div class="card uom-card">
                      @if (componentUoms.controls?.length>0) {
                        <div
                          class="prefer-uom-grid align-items-center"
                          >
                          @for (item of componentUoms.controls; track item; let i = $index) {
                            <div
                              [formGroup]="item"
                              class="my-2 attribute one b-none w-100"
                              >
                              <div
                                class="attribute-input justify-content-around w-100 title-text"
                                >
                                <div class="text-uppercase">
                                  {{item.get('attributeName').value}}
                                </div>
                                <select
                                  (change)="loadPurchaseordersList()"
                                  formControlName="userConversionUom"
                                  >
                                  @for (uom of uomService.getUoms(item.get('attributeTypeId').value); track uom) {
                                    <option [value]="uom.description">
                                      {{uom?.description}}
                                    </option>
                                  }
                                </select>
                              </div>
                            </div>
                          }
                        </div>
                      }
                    </div>
                  }
                </div>
                <div class="mt-2">
                  <data-table
                    [data]="orders"
                    [headers]="headers"
                    [searchTerm]="filterValue"
                    [pageConfig]="pageConfig"
                    (editData)="editRecord($event)"
                    (sortChange)="sort($event)"
                    (pageChange)="pageChange($event)"
                    [userShow]="true"
                    [actions]="tabelActions"
                    (actionClick)="onActionClick($event)"
                    >
                  </data-table>
                </div>
              </div>
            </ng-container>
          }
        </ng-template>
      </mat-tab>
    }
  </mat-tab-group>
</section>
