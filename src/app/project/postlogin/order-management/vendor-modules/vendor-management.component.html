<div class="app-container  " [ngClass]="{'app-container':!single}">
  <mat-tab-group class="mat-steps" [(selectedIndex)]="currentStepIndex" (selectedTabChange)="onTabChange($event)">
    @for (link of tabs; track link) {
      <mat-tab>
        <ng-template mat-tab-label>
          <span [matBadge]="link.badge" [matBadgeHidden]="link.badge === 0"
          [matBadgeOverlap]=false>{{link.title}}</span>
        </ng-template>
        <ng-template matTabContent>
          @if (link.index == 0) {
            <app-rfq-list [single]="single" [vendorId]="vendorId" [role]="'vendor'"></app-rfq-list>
          }
          @if (link.index == 1) {
            <app-receivedquotation-list [single]="single" [vendorId]="vendorId"  [role]="'vendor'"></app-receivedquotation-list>
          }
          @if (link.index == 2) {
            <app-purchaseorder-list [single]="single" [vendorId]="vendorId"  [role]="'vendor'"></app-purchaseorder-list>
          }
          @if (link.index == 3) {
            <app-bill-list [single]="single" [vendorId]="vendorId"  [role]="'vendor'"></app-bill-list>
          }
        </ng-template>
      </mat-tab>
    }
  </mat-tab-group>
</div>
