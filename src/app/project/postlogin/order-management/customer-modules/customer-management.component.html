<div [ngClass]="{ 'app-container': !single() }">
  <mat-tab-group class="mat-steps"
    [(selectedIndex)]="currentStepIndex"
    (selectedTabChange)="onTabChange($event)"
    >
    @for (link of tabs; track link) {
      <mat-tab>
        <ng-template mat-tab-label>
          <span
            [matBadge]="link.badge"
            [matBadgeHidden]="link.badge === 0"
            [matBadgeOverlap]="false"
            >{{ link.title }}</span
            >
          </ng-template>
          <ng-template matTabContent>
            @if (link.index === 0) {
              <app-received-rfq-list
                [customerId]="customerId()"
                [single]="single()"
                [role]="'customer'"
              ></app-received-rfq-list>
            }
            @if (link.index === 1) {
              <app-quotation-list
                [customerId]="customerId()"
                [single]="single()"
                [role]="'customer'"
              ></app-quotation-list>
            }
            @if (link.index === 2) {
              <app-receivedPo-list
                [customerId]="customerId()"
                [single]="single()"
                [role]="'customer'"
              ></app-receivedPo-list>
            }
            @if (link.index === 3) {
              <app-invoice-list
                [customerId]="customerId()"
                [single]="single()"
                [role]="'customer'"
              ></app-invoice-list>
            }
          </ng-template>
        </mat-tab>
      }
    </mat-tab-group>
  </div>
