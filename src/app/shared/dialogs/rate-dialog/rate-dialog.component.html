<div class="p-2">
  <div class="d-flex justify-content-between my-1">
    <div></div>
    <div class="title-text">Give Rating</div>
    <div>
      <dadyin-button type='icon' [typeval]="'close'" class="iconCen" (clicked)="close()"
        [theme]="'borderless-primary'">
      </dadyin-button>
    </div>
  </div>
  <div class="d-flex justify-content-center w-100 my-1 title-text">
    @for (star of [1,2,3,4,5]; track star; let i = $index) {
      <span (click)="rate(star)">
        @if (star <= rating) {
          <mat-icon class="star-icon-size primary-text">star</mat-icon>
        }
        @if (star > rating) {
          <mat-icon class="star-icon-size  primary-text">star_outline
          </mat-icon>
        }
      </span>
    }
  </div>
  <div  class="d-flex justify-content-center my-2">
    <dadyin-button
      label="Save Changes" (clicked)="save()" [theme]="'secondary'">
    </dadyin-button>
  </div>
</div>
