<form [formGroup]="changePasswordForm" class="p-2">
  <div class="d-flex justify-content-between align-items-center ">
    <h4 class="text-black mb-0 mx-2">Change Password</h4>
    <dadyin-button type='icon' [typeval]="'close'" (clicked)="close()" [theme]="'borderless-primary'">
    </dadyin-button>
  </div>
  <div class="p-2 mt-3">
    <div class="attribute one attr-b w-100">
      <label for="">Old Password*</label>
      <div class="attribute-input w-100 password-field">
        <input [type]="showOldPassword ? 'text' : 'password'" formControlName="oldPassword" />
        <button type="button" class="visibility-toggle"
          [attr.aria-label]="showOldPassword ? 'Hide old password' : 'Show old password'"
          (click)="showOldPassword = !showOldPassword">
          <mat-icon class="text-primary">{{ showOldPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>
    <div class="attribute one attr-b w-100">
      <label for="">New Password*</label>
      <div class="attribute-input w-100 password-field">
        <input [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword"
          [ngClass]="{'error-border': passwordMismatch && (f['newPassword'].dirty || f['confirmPassword'].dirty)}" />
        <button type="button" class="visibility-toggle"
          [attr.aria-label]="showNewPassword ? 'Hide new password' : 'Show new password'"
          (click)="showNewPassword = !showNewPassword">
          <mat-icon class="text-primary">{{ showNewPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
    </div>
    <div class="attribute one attr-b w-100">
      <label for="">Confirm Password*</label>
      <div class="attribute-input w-100 password-field">
        <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
          [ngClass]="{'error-border': passwordMismatch && (f['newPassword'].dirty || f['confirmPassword'].dirty)}" />
        <button type="button" class="visibility-toggle"
          [attr.aria-label]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'"
          (click)="showConfirmPassword = !showConfirmPassword">
          <mat-icon class="text-primary">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

    </div>
    <div class="error-text" *ngIf="passwordMismatch && (f['newPassword'].dirty || f['confirmPassword'].dirty)">
      Passwords do not match.
    </div>
  </div>
  <div class="text-center my-2 ">
    <dadyin-button type='icon' label="Change Password" [typeval]="'save'" [theme]="'borderless-white'"
      [isDisabled]="changePasswordForm.invalid || passwordMismatch || isSubmitting" (clicked)="changePassword()">
    </dadyin-button>
  </div>
</form>
