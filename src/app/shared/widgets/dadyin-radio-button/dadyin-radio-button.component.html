<mat-label class="lable"><strong>{{label}}</strong></mat-label><br />
<mat-radio-group class="customclass" [value]="value" name="formControlName">
  @for (option of options; track option) {
    <mat-radio-button [value]="option.value" (click)="onValueChange(option.value)">
      <span>{{option.label}}</span>
    </mat-radio-button>
  }
</mat-radio-group>
