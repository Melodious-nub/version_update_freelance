<div class="slider"  width="100%">
  <div class="slides" [style.transform]="'translateX(-' + currentIndex * 100 + '%)'">
    <ng-content ></ng-content>
  </div>
  @if (cardLength()>1) {
    <button class="nav prev" (click)="prev()">&#10094;</button>
  }
  @if (cardLength()>1) {
    <button class="nav next" (click)="next()">&#10095;</button>
  }
</div>
