<button [matTooltip]="tooltip" (click)="onClick($event)" [style.fontSize]="fontSize" [style.height]="height"
  [style.width]="width" class="btn-{{ theme }} {{ class }} {{ size }}" *ngIf="type === 'normal'"
  [disabled]="isDisabled">
  {{ label }}
</button>

<button [matTooltip]="tooltip" (click)="onClick($event)" [style.fontSize]="fontSize" [style.height]="height"
  [style.width]="width" class="btn-{{ theme }} {{ class }} {{ size }} btn-icon " *ngIf="type === 'icon'"
  [disabled]="isDisabled">
  <mat-icon [disabled]="isDisabled ? 'disabled' : ''">{{ typeval }}</mat-icon> 
   <span style="margin-left: 5px;vertical-align: super;" *ngIf="label!=''">{{label ? label : ''}}</span>
</button>

<button [matTooltip]="tooltip" (click)="onClick($event)" [style.fontSize]="fontSize" [style.height]="height"
  [style.width]="width" class="btn-{{ theme }} {{ class }} {{ size }} btn-image p-0 " *ngIf="type === 'image'"
  [disabled]="isDisabled">
  <img [style.height]="heightImage" [style.width]="widthImage" src="{{ typeval }}" class="mx-1" />
  {{ label }}
</button>
