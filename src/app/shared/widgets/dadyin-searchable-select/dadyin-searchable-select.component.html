<div class="attribute b-none" [ngClass]="{ 'attr-b': marginBottom }">
  <label class="bg-white" for="yesno">{{ label }}</label>
  <ng-select [required]="required" appendTo="body" (change)="onChange()" [multiple]="multiple" [formControl]="control"
    [searchable]="true" [clearable]="clearable" class="custom {{ class }}" [placeholder]="placeholder" [items]="fullItems"
    labelForId="yesno" [bindValue]="bindValue" [bindLabel]="bindLabel">
    <ng-template ng-label-tmp let-item="item">
      @if (item?.businessCategory && optionTag == 'businessCategory') {
        <span style="padding: 3px" class="mx-1"
        [ngClass]="{
          'self-product': item?.businessCategory[0] == 'C',
          'third-product': item?.businessCategory[0] == 'L',
          'master-product': item?.businessCategory[0] == 'P'
        }">
          {{ item?.businessCategory[0] }}
        </span>
      }
      <span>{{ item[bindLabel] }} </span>
    </ng-template>
    <ng-template ng-option-tmp let-item="item" let-index="index">
      <div [matTooltip]="returnAddress(item)" matTooltipPosition="right" class="ng-option-label">
        @if (optionTag == 'businessCategory') {
<span style="padding: 3px" class="mx-1" [ngClass]="{
            'self-product': item?.businessCategory[0] == 'C',
            'third-product': item?.businessCategory[0] == 'L',
            'master-product': item?.businessCategory[0] == 'P'
          }">
            {{ item?.businessCategory[0] }}
          </span>
        }
        <span>{{ item[bindLabel] }} </span>
        @if (item?.address) {
          <span>-({{ returnAddress(item) }})</span>
        }
      </div>
    </ng-template>
  </ng-select>
</div>
